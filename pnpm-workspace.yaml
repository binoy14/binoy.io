packages:
  - 'apps/*'
  - 'packages/*'

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@sanity/*'
  - 'sanity'
  - '@portabletext/*'
  - '@rolldown/*'
  - 'rolldown'
  - '@tybys/wasm-util'
  - '@sentry/*'
  - '@oclif/*'
  - '@napi-rs/*'
  - '@oxfmt/*'
  - '@turbo/*'
  - '@typescript-eslint/*'
  - '@testing-library/*'
  - '@sveltejs/*'
  - '@playwright/*'
  - '@vitejs/*'
  - '@iconify/*'
  - 'happy-dom'
  - 'svelte'
  - 'svelte-check'
  - 'svelte-highlight'
  - 'vite'
  - 'turbo'
  - 'oxfmt'
  - 'playwright'
  - 'playwright-core'
  - 'typescript-eslint'
  - 'eslint-config-turbo'
  - 'eslint-plugin-turbo'
  - 'globals'
  - 'groq'
  - 'styled-components'

allowBuilds:
  esbuild: false

catalog:
  '@sanity/client': '^7.23.0'
  '@sanity/image-url': '^2.1.1'
  '@sveltejs/adapter-vercel': '^6.3.4'
  '@sveltejs/kit': '^2.68.0'
  '@sveltejs/vite-plugin-svelte': '^7.1.2'
  '@tailwindcss/vite': '^4.3.2'
  '@vercel/analytics': '^2.0.1'
  classnames: '^2.5.1'
  eslint: '^9.39.4'
  globals: '^17.7.0'
  groq: '^6.3.0'
  svelte: '^5.56.6'
  svelte-check: '^4.7.2'
  tailwindcss: '^4.3.2'
  tslib: '^2.8.1'
  typescript: '^6.0.3'
  unplugin-icons: '^23.0.1'
  vite: '^8.1.3'
  vitest: '^4.1.9'
